name: quality-gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci-quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest typer

      - name: Run mirrored quality gates
        shell: bash
        run: |
          chmod +x tools/scripts/run_quality_gates_ci.sh
          tools/scripts/run_quality_gates_ci.sh
